

[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "Adva_Quant_Inform"
version = "0.0.1"
description = "Code repository of intership"
readme = "README.md"
requires-python = ">=3.9"

dependencies = [
    "numpy",
    "scipy",
    "matplotlib",
    "ipython",
    "ipywidgets",
    "notebook<7",
    "qutip", 
]

[project.optional-dependencies]
test = [
    "pytest",
    "pytest-cov",
    "nbconvert",
]

[tool.setuptools.packages.find]
where = ["."]

[tool.coverage.run]
omit = [
    "*/tests/*",
    "*/Adva_Quant_Inform/__init__.py",
] 